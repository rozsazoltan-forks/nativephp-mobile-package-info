name: Bug Report
description: Report a bug in the codingwithrk/package-info plugin
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the details below so we can investigate.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I have read the README and documentation
          required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which platform(s) are affected?
      multiple: true
      options:
        - Android
        - iOS
    validations:
      required: true

  - type: input
    id: plugin_version
    attributes:
      label: Plugin Version
      description: Which version of `codingwithrk/package-info` are you using?
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: input
    id: nativephp_version
    attributes:
      label: NativePHP Mobile Version
      description: Which version of NativePHP Mobile are you using?
      placeholder: "e.g. 3.x"
    validations:
      required: true

  - type: input
    id: laravel_version
    attributes:
      label: Laravel Version
      placeholder: "e.g. 11.x"
    validations:
      required: true

  - type: input
    id: os_version
    attributes:
      label: Device / OS Version
      description: Android version or iOS version, and device model if relevant
      placeholder: "e.g. Android 14 (Pixel 7) / iOS 17.4 (iPhone 15)"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Call `PackageInfo::getInfo()`
        2. ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include any error messages or stack traces.
    validations:
      required: true

  - type: textarea
    id: code
    attributes:
      label: Relevant Code
      description: Share the PHP/JS code you are using to call the plugin.
      render: php

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or logs that might help.
